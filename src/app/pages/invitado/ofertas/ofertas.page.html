<ion-header class="ion-no-border">
  <ion-toolbar style="--background: #2c2c2c;">
    <div class="flex items-center px-4 py-3 bg-[#2c2c2c]">
      
      <ion-icon name="chevron-back" (click)="irALogin()" class="text-white text-3xl cursor-pointer active:scale-95 transition-transform"></ion-icon>
      
      <h1 class="text-white text-lg font-medium tracking-wide flex-1 text-center pr-8">
        MODO INVITADO
      </h1>
      
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" style="--background: #2c2c2c;">
  
  <div class="w-full bg-[#2c2c2c] flex items-center justify-center py-3 px-4">
    <img src="../../../../assets/images/banner_panel.png" 
         alt="Publicidad Migo" 
         class="h-16 w-auto object-contain rounded-md shadow-sm">
    </div>

  <div class="px-4 pb-6 mt-2">
    
    <div *ngFor="let campana of campanasDisponibles" class="bg-white rounded-3xl p-5 shadow-lg relative mb-4">
      
      <div class="flex justify-between">
        <div class="flex flex-col w-2/3">
          <h3 class="text-black font-black text-[17px] leading-tight uppercase">{{campana.nombreCampana}}</h3>
          <p class="text-black text-sm mt-1">Empresa: {{campana.nombreEmpresa}}</p>
          <p class="text-black text-sm mt-1">Publicado: {{campana.fechaPublicacion}}</p>
          <p class="text-black text-sm mt-1">Regístrate hasta: {{campana.fechaLimite}}</p>
        </div>
        
        <div class="w-1/3 flex justify-end items-start pt-1 pr-1">
          <div class="flex items-center text-gray-600 text-sm">
            <span class="text-[10px] mr-1">🖼️</span> Marca
          </div>
        </div>
      </div>

      <div class="mt-5 flex justify-between items-end">
        <div class="flex flex-col space-y-3">
          <div class="flex items-center text-black text-[15px]">
            <ion-icon name="location" class="text-[#00c2b8] text-2xl mr-2"></ion-icon>
            {{campana.sectores}}
          </div>
          <div class="flex items-center text-black text-[15px]">
            <ion-icon name="logo-usd" class="text-[#00c2b8] text-2xl mr-2"></ion-icon>
            {{campana.tarifa}}
          </div>
        </div>

        <button (click)="irARegistro()" class="bg-[#00c2b8] active:bg-teal-600 text-white font-bold py-2.5 px-5 rounded-xl text-xs shadow-md transition-colors tracking-wide">
          APLICAR
        </button>
      </div>

    </div>

  </div>

</ion-content>
