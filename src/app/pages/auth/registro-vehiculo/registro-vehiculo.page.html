<ion-header class="ion-no-border">
  <ion-toolbar style="--background: #1a1a1a;">
    <div class="flex items-center justify-between px-4 py-3 bg-[#1a1a1a]">
      <ion-icon name="chevron-back" (click)="irAtras()"
        class="text-white text-3xl cursor-pointer active:scale-95 transition-transform"></ion-icon>
      
      <span class="text-white text-lg font-medium tracking-wide uppercase">
        {{ origen === 'perfil' ? 'AGREGAR VEHÍCULO' : 'REGISTRAR VEHÍCULO' }}
      </span>
      
      <div class="w-8"></div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" style="--background: #1a1a1a;">

  <div class="flex justify-center mt-6 mb-6">
    <img src="../../../../assets/images/migo_logo.png" alt="Migo Ads" class="h-20 object-contain"
      onerror="this.style.display='none'">
  </div>

  <div class="px-4 space-y-4">
    <div class="flex flex-col">
      <label class="text-white text-sm font-bold mb-1 ml-2">Placa</label>
      <input type="text" [(ngModel)]="placa" placeholder="Ingrese la placa. Ejemplo: GXY1234"
        class="bg-white rounded-full px-5 py-3 text-black text-sm outline-none uppercase font-semibold" />
    </div>
    <div class="flex flex-col">
      <label class="text-white text-sm font-bold mb-1 ml-2">Año</label>
      <input type="number" placeholder="Ingrese el año"
        class="bg-white rounded-full px-5 py-3 text-black text-sm outline-none font-semibold" />
    </div>

    <div class="flex flex-col relative">
      <label class="flex items-center text-white text-sm font-bold mb-1 ml-2">Marca <ion-icon name="help-circle-outline"
          class="ml-1 text-[#00c2b8] text-lg"></ion-icon></label>
      <select
        class="bg-white rounded-full px-5 py-3 text-black text-sm outline-none appearance-none font-semibold w-full">
        <option>Seleccionar marca</option>
      </select>
      <ion-icon name="chevron-down" class="absolute right-4 top-10 text-gray-500"></ion-icon>
    </div>

    <div class="flex flex-col relative">
      <label class="flex items-center text-white text-sm font-bold mb-1 ml-2">Modelo <ion-icon
          name="help-circle-outline" class="ml-1 text-[#00c2b8] text-lg"></ion-icon></label>
      <select
        class="bg-white rounded-full px-5 py-3 text-black text-sm outline-none appearance-none font-semibold w-full">
        <option>Seleccionar modelo</option>
      </select>
      <ion-icon name="chevron-down" class="absolute right-4 top-10 text-gray-500"></ion-icon>
    </div>

    <div class="flex flex-col relative">
      <label class="flex items-center text-white text-sm font-bold mb-1 ml-2">Categoría <ion-icon
          name="help-circle-outline" class="ml-1 text-[#00c2b8] text-lg"></ion-icon></label>
      <select
        class="bg-white rounded-full px-5 py-3 text-black text-sm outline-none appearance-none font-semibold w-full">
        <option>Seleccionar categoría</option>
      </select>
      <ion-icon name="chevron-down" class="absolute right-4 top-10 text-gray-500"></ion-icon>
    </div>

    <div class="flex flex-col relative">
      <label class="text-white text-sm font-bold mb-1 ml-2">Color</label>
      <select
        class="bg-white rounded-full px-5 py-3 text-black text-sm outline-none appearance-none font-semibold w-full">
        <option>Seleccionar color</option>
      </select>
      <ion-icon name="chevron-down" class="absolute right-4 top-10 text-gray-500"></ion-icon>
    </div>
  </div>

  <div class="bg-[#00c2b8] w-full py-2 px-6 shadow-md mt-8 mb-6">
    <h2 class="text-black text-lg font-bold">Fotos del vehículo</h2>
  </div>

  <div class="grid grid-cols-2 gap-4 px-4 pb-4">
    <div
      class="border-2 border-dashed border-white rounded-[20px] h-48 flex flex-col items-center justify-center relative overflow-hidden bg-transparent">
      <img *ngIf="fotos.lateralIzq" [src]="fotos.lateralIzq"
        class="absolute inset-0 w-full h-full object-cover opacity-70">
      <span class="text-white font-bold text-sm mb-3 z-10 drop-shadow-md">Lateral Izquierdo</span>
      <button (click)="tomarFoto('lateralIzq')"
        class="bg-transparent text-[#00c2b8] font-bold text-sm z-10 active:scale-95 transition-transform uppercase underline">
        {{ fotos.lateralIzq ? 'Cambiar Foto' : 'Tomar Foto' }}
      </button>
    </div>

    <div
      class="border-2 border-dashed border-white rounded-[20px] h-48 flex flex-col items-center justify-center relative overflow-hidden bg-transparent">
      <img *ngIf="fotos.lateralDer" [src]="fotos.lateralDer"
        class="absolute inset-0 w-full h-full object-cover opacity-70">
      <span class="text-white font-bold text-sm mb-3 z-10 drop-shadow-md">Lateral Derecho</span>
      <button (click)="tomarFoto('lateralDer')"
        class="bg-transparent text-[#00c2b8] font-bold text-sm z-10 active:scale-95 transition-transform uppercase underline">
        {{ fotos.lateralDer ? 'Cambiar Foto' : 'Tomar Foto' }}
      </button>
    </div>

    <div
      class="border-2 border-dashed border-white rounded-[20px] h-48 flex flex-col items-center justify-center relative overflow-hidden bg-transparent">
      <img *ngIf="fotos.trasera" [src]="fotos.trasera" class="absolute inset-0 w-full h-full object-cover opacity-70">
      <span class="text-white font-bold text-sm mb-3 z-10 drop-shadow-md">Foto Trasera</span>
      <button (click)="tomarFoto('trasera')"
        class="bg-transparent text-[#00c2b8] font-bold text-sm z-10 active:scale-95 transition-transform uppercase underline">
        {{ fotos.trasera ? 'Cambiar Foto' : 'Tomar Foto' }}
      </button>
    </div>

    <div
      class="border-2 border-dashed border-white rounded-[20px] h-48 flex flex-col items-center justify-center relative overflow-hidden bg-transparent">
      <img *ngIf="fotos.aerea" [src]="fotos.aerea" class="absolute inset-0 w-full h-full object-cover opacity-70">
      <span class="text-white font-bold text-sm mb-3 z-10 drop-shadow-md">Foto Aérea</span>
      <button (click)="tomarFoto('aerea')"
        class="bg-transparent text-[#00c2b8] font-bold text-sm z-10 active:scale-95 transition-transform uppercase underline">
        {{ fotos.aerea ? 'Cambiar Foto' : 'Tomar Foto' }}
      </button>
    </div>
  </div>

  <div class="px-4 pb-8">
    <div
      class="border-2 border-dashed border-white rounded-[20px] h-48 flex flex-col items-center justify-center relative overflow-hidden bg-transparent">
      <img *ngIf="fotos.frontal" [src]="fotos.frontal" class="absolute inset-0 w-full h-full object-cover opacity-70">
      <span class="text-white font-bold text-sm mb-3 z-10 drop-shadow-md">Foto Frontal</span>
      <button (click)="tomarFoto('frontal')"
        class="bg-transparent text-[#00c2b8] font-bold text-sm z-10 active:scale-95 transition-transform uppercase underline">
        {{ fotos.frontal ? 'Cambiar Foto' : 'Tomar Foto' }}
      </button>
    </div>
  </div>

  <div class="flex justify-center pb-12 px-4">
    <button (click)="finalizarRegistro()"
      class="bg-[#00c2b8] active:bg-teal-600 text-black font-bold py-3 px-12 rounded-xl text-sm shadow-md transition-colors uppercase tracking-widest w-full max-w-[300px]">
      {{ origen === 'perfil' ? 'AGREGAR VEHÍCULO' : 'FINALIZAR REGISTRO' }}
    </button>
  </div>

</ion-content>
