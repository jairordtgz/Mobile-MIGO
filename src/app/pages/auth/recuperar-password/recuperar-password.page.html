<ion-content [fullscreen]="true" style="--background: #2c2c2c;">
  <div class="flex items-center px-4 py-3 bg-[#2c2c2c]">
    <ion-icon name="chevron-back" (click)="irAtras()"
      class="text-white text-3xl cursor-pointer active:scale-95 transition-transform"></ion-icon>
  </div>

  <div class="flex flex-col items-center min-h-full px-10 py-6">
    <div class="mb-10 w-full flex justify-center">
      <img src="../../../../assets/images/migo_logo.png" alt="Migo Ads" class="h-28 object-contain">
    </div>

    <div class="w-full text-center mb-10">
      <h2 class="text-white text-2xl font-bold mb-2">Recuperar Contraseña</h2>
      <p class="text-gray-400 text-sm">
        El código se enviará a la siguiente dirección de correo electrónico.
      </p>
    </div>

    <div class="w-full flex flex-col space-y-2">
      <div class="border-b border-white pb-2" [class.border-red-500]="emailInvalido">
        <input type="email" [(ngModel)]="correo" placeholder="Ingrese su correo electrónico"
          class="w-full bg-transparent text-white placeholder-gray-400 outline-none font-bold text-sm">
      </div>
      <p *ngIf="emailInvalido" class="text-red-500 text-xs font-bold mt-1">Email no válido</p>
    </div>

    <button (click)="enviar()"
      class="bg-[#00c2b8] active:bg-teal-600 text-black font-bold py-3 px-8 rounded-xl mt-12 text-[15px] shadow-md tracking-wide w-full">
      ENVIAR
    </button>
  </div>
</ion-content>
